name: PR Assignment Check

# Trigger: fires whenever a new PR is opened
on:
  pull_request:
    types: [opened]

jobs:
  check-assignment:
    runs-on: ubuntu-latest

    steps:
      - name: Check if PR author is assigned to an issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const MAINTAINER = 'AditthyaSS';
            const author = context.payload.pull_request.user.login;
            const prNumber = context.payload.pull_request.number;
            const prBody = (context.payload.pull_request.body || '');
            const prTitle = (context.payload.pull_request.title || '');
            const prText = `${prTitle} ${prBody}`;

            // ── Never touch PRs from the maintainer
            if (author === MAINTAINER) {
              console.log(`PR #${prNumber} is from maintainer ${MAINTAINER}. Skipping.`);
              return;
            }

            // ─────────────────────────────────────────────────────────────
            // STEP 1: Extract linked issue number from PR title or body
            // Looks for: Closes #N, Fixes #N, Resolves #N (case insensitive)
            // ─────────────────────────────────────────────────────────────
            const linkMatch = prText.match(
              /(?:closes?|fixes?|resolves?)\s+#(\d+)/i
            );
            const linkedIssueNumber = linkMatch ? parseInt(linkMatch[1], 10) : null;

            console.log(`PR #${prNumber} by ${author} — linked issue: ${linkedIssueNumber ?? 'none'}`);

            // ─────────────────────────────────────────────────────────────
            // STEP 2: Find all open issues assigned to this PR author
            // Paginate through all open issues and check assignees list
            // ─────────────────────────────────────────────────────────────
            const allIssues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                assignee: author,  // filter directly by assignee for efficiency
                per_page: 100,
              }
            );

            // Filter out pull requests — GitHub returns PRs in the issues list
            const assignedIssues = allIssues.filter(i => !i.pull_request);

            console.log(`Found ${assignedIssues.length} open issue(s) assigned to ${author}`);

            const isAssigned = assignedIssues.length > 0;

            // Pick the first assigned issue as their "current" issue
            const assignedIssue = isAssigned ? assignedIssues[0] : null;
            const assignedIssueNumber = assignedIssue?.number ?? null;
            const assignedIssueTitle = assignedIssue?.title ?? '';

            // ─────────────────────────────────────────────────────────────
            // STEP 3: Route to the correct scenario
            // ─────────────────────────────────────────────────────────────

            if (!isAssigned && !linkedIssueNumber) {
              // ── SCENARIO 1: Not assigned + no issue linked → close PR
              console.log(`Scenario 1: ${author} is not assigned and linked no issue. Closing PR.`);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body:
                  `hey @${author}! 👋\n\n` +
                  `This PR has been closed because you don't seem to be assigned to any issue yet.\n\n` +
                  `Here's how it works in iloveAgents:\n` +
                  `1. 🔍 Find an open issue that interests you\n` +
                  `2. 💬 Comment on it saying you'd like to work on it\n` +
                  `3. ⏳ Wait for the maintainer to assign it to you\n` +
                  `4. 🚀 Then open your PR!\n\n` +
                  `This helps us avoid duplicate work and keeps things organized for everyone.\n\n` +
                  `Check out open issues here → https://github.com/AditthyaSS/iloveAgents/issues\n\n` +
                  `Hope to see you back soon! 🙏\n\n` +
                  `— [@AditthyaSS](https://github.com/AditthyaSS)`
              });

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                state: 'closed',
              });

            } else if (!isAssigned && linkedIssueNumber) {
              // ── SCENARIO 2: Not assigned + has linked issue → close PR
              console.log(`Scenario 2: ${author} linked issue #${linkedIssueNumber} but is not assigned. Closing PR.`);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body:
                  `hey @${author}! 👋\n\n` +
                  `This PR has been closed because you are not assigned to issue #${linkedIssueNumber}.\n\n` +
                  `Here's how it works in iloveAgents:\n` +
                  `1. 🔍 Go to the issue you want to work on\n` +
                  `2. 💬 Comment saying you'd like to work on it\n` +
                  `3. ⏳ Wait for the maintainer to assign it to you\n` +
                  `4. 🚀 Then open your PR!\n\n` +
                  `Once you are assigned, feel free to reopen this PR.\n\n` +
                  `Check out open issues here → https://github.com/AditthyaSS/iloveAgents/issues\n\n` +
                  `Hope to see you back soon! 🙏\n\n` +
                  `— [@AditthyaSS](https://github.com/AditthyaSS)`
              });

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                state: 'closed',
              });

            } else if (isAssigned && !linkedIssueNumber) {
              // ── SCENARIO 3: Assigned + forgot to link issue → warn, add label, do NOT close
              console.log(`Scenario 3: ${author} is assigned to #${assignedIssueNumber} but did not link it. Commenting.`);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body:
                  `hey @${author}! 👋\n\n` +
                  `You're assigned to an issue but haven't linked it in your PR description.\n\n` +
                  `Please add this line to your PR description:\n` +
                  `\`Closes #${assignedIssueNumber}\`\n\n` +
                  `(Your assigned issue is: #${assignedIssueNumber} — ${assignedIssueTitle})\n\n` +
                  `This helps us track and close the issue automatically when your PR merges! 🔗\n\n` +
                  `— [@AditthyaSS](https://github.com/AditthyaSS)`
              });

              // Add needs-fix label (create it if it doesn't exist yet)
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'needs-fix',
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'needs-fix',
                  color: 'd73a4a',
                  description: 'Something needs to be corrected before merging',
                });
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['needs-fix'],
              });

            } else {
              // ── SCENARIO 4: Assigned + issue linked correctly → do nothing
              console.log(`Scenario 4: ${author} is assigned and linked issue #${linkedIssueNumber}. All good. ✅`);
            }
