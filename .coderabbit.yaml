language: "en-US"

reviews:
  profile: "chill"
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!package-lock.json"
    - "!*.md"

chat:
  auto_reply: true

issues:
  auto_assign: false
